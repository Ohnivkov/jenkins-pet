services:
  web:
    build: ./app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=devops_db
      - DB_USER=postgres
      - DB_PASSWORD=mamba_mentality
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=devops_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mamba_mentality
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata: