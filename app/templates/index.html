<!DOCTYPE html>
<html lang="uk" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Pet UI — Mamba Workspace</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0b0b0c] text-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="border-b border-zinc-800 bg-[#121214]/50 backdrop-blur px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="h-3 w-3 rounded-full bg-emerald-500 animate-pulse"></div>
            <span class="font-mono text-sm tracking-wider text-zinc-400">PIPELINE RUNNING</span>
        </div>
        <h1 class="text-lg font-bold tracking-tight uppercase">FastAPI <span class="text-purple-500">Pet UI</span></h1>
    </header>

    <main class="max-w-4xl w-full mx-auto p-6 my-auto">
        <div class="bg-[#121214] border border-zinc-800 rounded-xl p-8 shadow-2xl space-y-6">
            <div class="border-l-4 border-purple-500 pl-4">
                <h2 class="text-2xl font-bold tracking-tight text-white">Керування рекордами</h2>
                <p class="text-zinc-400 text-sm mt-1">Локальна синхронізація інфраструктури та логів бази даних.</p>
            </div>

            <div class="bg-black/40 rounded-lg p-6 border border-zinc-900 font-mono text-sm text-zinc-300">
                <p class="text-emerald-400">// Система готова до обробки даних</p>
                <div class="mt-4 p-3 bg-zinc-900/50 rounded text-xs text-purple-400">
                    STATUS: 200 OK | DATABASE: {{ db_status }}
                </div>
            </div>

            <button class="w-full py-3 bg-white text-black font-semibold rounded-lg hover:bg-zinc-200 transition-all uppercase tracking-wider text-sm active:scale-[0.99]">
                Додати новий запис
            </button>
        </div>
    </main>

   
</body>
</html>
